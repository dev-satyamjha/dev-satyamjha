name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github&color_snake=%2322d3ee&color_dots=#ebedf0,#a5f3fc,#67e8f9,#06b6d4,#22d3ee&color_background=%23000d10
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2322d3ee&color_dots=#161b22,#083344,#155e75,#0e7490,#22d3ee&color_background=%23000d10
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
