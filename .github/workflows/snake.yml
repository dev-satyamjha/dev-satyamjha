name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github&color_snake=%23d4a017&color_dots=#ebedf0,#fff3b0,#ffe066,#ffc200,#d4a017&color_background=%230a0700
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23d4a017&color_dots=#161b22,#3d2e00,#7a5c00,#b38600,#d4a017&color_background=%230a0700
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
